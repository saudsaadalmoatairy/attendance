<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>نظام الحضور</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#060b14;color:#dde6f0;min-height:100vh}#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}#main-page{display:none}.box{width:100%;max-width:400px;background:#0c1524;border:1px solid #1a3050;border-radius:20px;padding:28px;text-align:center}.logo{font-size:48px;margin-bottom:10px}h1{color:#00c2ff;font-size:20px;margin-bottom:4px}p{color:#5a7a9a;font-size:13px;margin-bottom:20px}.row{display:flex;gap:8px;margin-bottom:14px}.rbtn{flex:1;padding:9px;background:transparent;border:1.5px solid #1a3050;border-radius:10px;color:#5a7a9a;font-size:13px;cursor:pointer}.rbtn.on{border-color:#00c2ff;color:#00c2ff;background:rgba(0,194,255,.08)}lbl{display:block;text-align:right;font-size:12px;color:#5a7a9a;margin-bottom:4px}input,select{width:100%;padding:10px 13px;background:#111e30;border:1.5px solid #1a3050;border-radius:10px;color:#dde6f0;font-size:14px;margin-bottom:12px;outline:none;direction:rtl}input:focus,select:focus{border-color:#00c2ff}.btn{width:100%;padding:13px;background:linear-gradient(135deg,#00c2ff,#0088cc);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}.err{margin-top:10px;padding:9px;border-radius:9px;font-size:13px;background:rgba(255,71,87,.1);color:#ff4757;border:1px solid rgba(255,71,87,.2);display:none}.topbar{background:#0c1524;border-bottom:1px solid #1a3050;padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0}.topbar-title{color:#00c2ff;font-size:14px;font-weight:700}.user-info{background:#111e30;padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid #1a3050}.nav{display:flex;gap:4px;padding:10px 14px;border-bottom:1px solid #1a3050;overflow-x:auto;background:#0c1524}.nav::-webkit-scrollbar{display:none}.ntab{padding:6px 14px;border-radius:20px;border:1.5px solid transparent;background:transparent;color:#5a7a9a;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}.ntab.on{border-color:#00c2ff;color:#00c2ff;background:rgba(0,194,255,.08)}.cont{padding:16px;max-width:900px;margin:0 auto}.sec{display:none}.sec.on{display:block}.card{background:#0c1524;border:1px solid #1a3050;border-radius:14px;padding:16px;margin-bottom:12px}.checkin-area{text-align:center}.cam-wrap{position:relative;width:100%;max-width:280px;margin:0 auto 14px;border-radius:14px;overflow:hidden;border:2px solid #1a3050;aspect-ratio:4/3;background:#000}#cam{width:100%;height:100%;object-fit:cover;display:block}.cam-cover{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:30px}.cam-cover.hide{display:none}.loc{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:14px}.loc.wait{background:rgba(255,165,2,.08);border:1px solid rgba(255,165,2,.2);color:#ffa502}.loc.ok{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:#00e676}.loc.bad{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);color:#ff4757}.bbtn{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;margin:4px}.cam-btn{background:rgba(0,194,255,.1);color:#00c2ff;border:1px solid rgba(0,194,255,.3)!important;border:none}.go-btn{background:linear-gradient(135deg,#00c2ff,#0088cc);color:#000}.bbtn:disabled{opacity:.35;cursor:not-allowed}.done-box{background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.2);border-radius:10px;padding:12px;margin-top:12px;display:none}.wd-sec{margin-top:12px;display:none}textarea{width:100%;padding:10px;background:#111e30;border:1.5px solid #1a3050;border-radius:10px;color:#dde6f0;font-family:sans-serif;font-size:13px;resize:vertical;outline:none;direction:rtl;margin-bottom:8px}textarea:focus{border-color:#ffa502}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14​​​​​​​​​​​​​​​​
px}.stat{background:#111e30;border:1px solid #1a3050;border-radius:12px;padding:14px}.sv{font-size:26px;font-weight:900;margin-bottom:2px}.sl{font-size:11px;color:#5a7a9a}.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th{padding:9px 10px;text-align:right;color:#5a7a9a;font-size:11px;border-bottom:1px solid #1a3050}.tbl td{padding:9px 10px;border-bottom:1px solid rgba(26,48,80,.4);vertical-align:middle}.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}.present{background:rgba(0,230,118,.1);color:#00e676;border:1px solid rgba(0,230,118,.2)}.absent{background:rgba(255,71,87,.1);color:#ff4757;border:1px solid rgba(255,71,87,.2)}.withdraw{background:rgba(255,165,2,.1);color:#ffa502;border:1px solid rgba(255,165,2,.2)}.site-tag{background:rgba(0,194,255,.07);border:1px solid rgba(0,194,255,.18);color:#00c2ff;padding:2px 6px;border-radius:5px;font-size:11px}.time-tag{background:#111e30;border:1px solid #1a3050;border-radius:5px;padding:2px 6px;font-size:11px;font-family:monospace;color:#00c2ff}.thumb{width:32px;height:32px;border-radius:7px;object-fit:cover;border:1px solid #1a3050;cursor:pointer}.act{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none}.ap{background:rgba(0,230,118,.1);color:#00e676;border:1px solid rgba(0,230,118,.2)!important;border:none}.rj{background:rgba(255,71,87,.1);color:#ff4757;border:1px solid rgba(255,71,87,.2)!important;border:none}.notif{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:#111e30;border:1px solid #1a3050;border-radius:10px;padding:9px 16px;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5)}.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}.notif.s{border-color:#00e676;color:#00e676}.notif.e{border-color:#ff4757;color:#ff4757}.notif.w{border-color:#ffa502;color:#ffa502}.emp-item{background:#111e30;border:1px solid #1a3050;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.del{background:rgba(255,71,87,.1);color:#ff4757;border:1px solid rgba(255,71,87,.2);border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer}.add-form{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;margin-bottom:14px}canvas{display:none}</style></head><body><div id="login-page"><div class="box"><div class="logo">🛡️</div><h1>نظام الحضور الذكي</h1><p>سجّل دخولك للمتابعة</p><div class="row"><button class="rbtn on" onclick="sr('guard',this)">👮 فرد أمن</button><button class="rbtn" onclick="sr('manager',this)">🎛️ مدير</button></div><select id="ls"><option value="العمق">موقع العمق</option><option value="العطيف">موقع العطيف</option><option value="المويهيه">موقع المويهيه</option><option value="ورشة 200">ورشة 200</option></select><input id="ln" placeholder="اسمك الكامل"><div id="pw" style="display:none"><input id="lp" type="password" placeholder="كلمة مرور المدير"></div><button class="btn" onclick="login()">دخول →</button><div class="err" id="lerr"></div></div></div><div id="main-page"><div class="topbar"><div class="topbar-title">🛡️ <span id="tb-co">نظام الحضور</span></div><div style="display:flex;gap:6px;align-items:center"><div class="user-info" id="tb-user"></div><button style="background:transparent;border:1px solid #1a3050;color:#5a7a9a;padding:4px 10px;border-radius:7px;font-size:12px;cursor:pointer" onclick="logout()">خروج</button></div></div><div class="nav" id="nav"></div><div class="cont" id="cont"></div></div><div class="notif" id="notif"></div><canvas id="snap"></canvas>
<script>let role='guard',cfg=JSON.parse(localStorage.getItem('cfg')||'null'),att=JSON.parse(localStorage.getItem('att')||'[]'),wds=JSON.parse(localStorage.getItem('wds')||'[]'),stream=null,locOk=false;if(!cfg){cfg={pass:'admin123',absTime:'09:00',company:'نظام الحضور',sites:{'العمق':{lat:null,lng:null,r:300},'العطيف':{lat:null,lng:null,r:300},'المويهيه':{lat:null,lng:null,r:300},'ورشة 200':{lat:null,lng:null,r:300}},emps:[]};save()}function save(){localStorage.setItem('cfg',JSON.stringify(cfg));localStorage.setItem('att',JSON.stringify(att));localStorage.setItem('wds',JSON.stringify(wds))}function sr(r,b){role=r;document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('pw').style.display=r==='manager'?'block':'none'}function login(){const n=document.getElementById('ln').value.trim(),s=document.getElementById('ls').value,e=document.getElementById('lerr');if(!n){e.style.display='block';e.textContent='⚠️ أدخل اسمك';return}if(role==='manager'&&document.getElementById('lp').value!==cfg.pass){e.style.display='block';e.textContent='❌ كلمة مرور خاطئة';return}e.style.display='none';document.getElementById('login-page').style.display='none';document.getElementById('main-page').style.display='block';document.getElementById('tb-user').textContent=n+' | '+s;document.getElementById('tb-co').textContent=cfg.company;initApp(n,s)}function initApp(n,s){const nav=document.getElementById('nav');if(role==='guard'){nav.innerHTML='<button class="ntab on" onclick="showS(\'ci\',this)">📋 الحضور</button>';showS('ci');initGuard(n,s)}else{nav.innerHTML='<button class="ntab on" onclick="showS(\'db\',this)">📊 لوحة التحكم</button><button class="ntab" onclick="showS(\'wd\',this)">⬅️ الانسحابات</button><button class="ntab" onclick="showS(\'em\',this)">👥 الأفراد</button><button class="ntab" onclick="showS(\'si\',this)">📍 المواقع</button>';showS('db');renderDB()}}function showS(id,b){document.querySelectorAll('.sec').forEach(x=>x.classList.remove('on'));let el=document.getElementById('s-'+id);if(!el){el=document.createElement('div');el.id='s-'+id;el.className='sec';document.getElementById('cont').appendChild(el)}el.classList.add('on');if(b){document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));b.classList.add('on')}if(id==='db')renderDB();if(id==='wd')renderWD()}function notify(m,t='s'){const el=document.getElementById('notif');el.textContent=m;el.className='notif show '+t;setTimeout(()=>el.classList.remove('show'),3000)}function logout(){if(stream)stream.getTracks().forEach(t=>t.stop());document.getElementById('main-page').style.display='none';document.getElementById('login-page').style.display='flex'}function today(){return new Date().toISOString().split('T')[0]}function fmt(ts){const d=new Date(ts);return d.toLocaleDateString('ar-SA')+' '+d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}function dist(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}function initGuard(n,s){const el=document.getElementById('s-ci');el.innerHTML=`<div class="card checkin-area"><div style="background:#111e30;padding:6px 12px;border-radius:20px;font-size:13px;border:1px solid #1a3050;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px">📍 ${s}</div><h2 style="font-size:17px;margin-bottom:4px">تسجيل الحضور</h2><p style="font-size:12px;color:#5a7a9a;margin-bottom:16px">الكاميرا + GPS مطلوبان</p><div class="cam-wrap"><video id="cam" autoplay playsinline muted></video><div class="cam-cover" id="cov"><span>📷</span><p style="font-size:12px;color:#aaa">الكاميرا معطلة</p></div></div><div class="loc wait" id="loc">⏳ جارٍ تحديد الموقع...</div><div><button class="bbtn cam-btn" id="bcam" onclick="startCam()">📷 تشغيل الكاميرا</button><button class="bbtn go-btn" id="bgo" onclick="doCI('${n}','${s}')" disabled>✅ تسجيل الحضور</button></div><div class="done-box" id="dbox"><p style="color:#00e676;font-weight:700">✅ تم تسجيل حضورك</p><p id="dtime" style="font-size:12px;color:#5a7a9a;margin-top:4px"></p></div></div><div class="card wd-sec" id="wdsec"><h3 style="color:#ffa502;font-size:14px;margin-bottom:10px">⬅️ طلب انسحاب</h3><textarea id="wdr" rows="3" placeholder="اكتب السبب..."></textarea><button class="btn" onclick="sendWD('${n}','${s}')">📤 إرسال الطلب</button><div id="wdpend" style="display:none;margin-top:10px;padding:9px;background:rgba(255,165,2,.07);border-radius:9px;border:1px solid rgba(255,165,2,.2);color:#ffa502;font-size:13px">⏳ طلبك قيد المراجعة...</div></div>`;const ex=att.find(a=>a.name===n&&a.site===s&&a.date===today());if(ex)setDone(ex,n,s);else checkLoc(s)}function checkLoc(s){const el=document.getElementById('loc');if(!navigator.geolocation){el.className='loc bad';el.textContent='❌ الجهاز لا يدعم GPS';return}navigator.geolocation.getCurrentPosition(p=>{const sc=cfg.sites[s];if(!sc||sc.lat===null){el.className='loc ok';el.textContent='✅ تم التحديد (الموقع غير محدد - مسموح)';locOk=true;updBtn();return}const d=dist(p.coords.latitude,p.coords.longitude,sc.lat,sc.lng);if(d<=sc.r){el.className='loc ok';el.textContent=`✅ أنت في الموقع (${Math.round(d)}م)`;locOk=true}else{el.className='loc bad';el.textContent=`❌ خارج النطاق (${Math.round​​​​​​​​​​​​​​​​
(d)}م — الحد ${sc.r}م)`;locOk=false}updBtn()},()=>{el.className='loc bad';el.textContent='❌ تعذّر GPS';locOk=false;updBtn()},{enableHighAccuracy:true,timeout:12000})}function startCam(){navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false}).then(s=>{stream=s;const v=document.getElementById('cam');v.srcObject=s;document.getElementById('cov').classList.add('hide');document.getElementById('bcam').style.display='none';updBtn()}).catch(()=>notify('❌ تعذّر الكاميرا','e'))}function updBtn(){const b=document.getElementById('bgo');if(b)b.disabled=!(stream&&locOk)}function doCI(n,s){if(!stream||!locOk)return;const cv=document.getElementById('snap'),v=document.getElementById('cam');cv.width=v.videoWidth||320;cv.height=v.videoHeight||240;cv.getContext('2d').drawImage(v,0,0,cv.width,cv.height);const ph=cv.toDataURL('image/jpeg',.5),r={id:Date.now(),name:n,site:s,date:today(),ts:new Date().toISOString(),photo:ph,status:'present'};att.push(r);save();if(stream)stream.getTracks().forEach(t=>t.stop());stream=null;setDone(r,n,s);notify('✅ تم تسجيل حضورك')}function setDone(r,n,s){document.getElementById('dbox').style.display='block';document.getElementById('dtime').textContent='وقت التسجيل: '+fmt(r.ts);const b=document.getElementById('bgo');if(b)b.disabled=true;const bc=document.getElementById('bcam');if(bc)bc.style.display='none';document.getElementById('wdsec').style.display='block';const wd=wds.find(w=>w.aid===r.id);if(wd){document.getElementById('wdr').disabled=true;document.getElementById('wdpend').style.display='block'}}function sendWD(n,s){const reason=document.getElementById('wdr').value.trim();if(!reason){notify('⚠️ أدخل السبب','w');return}const t=today(),a=att.find(x=>x.name===n&&x.site===s&&x.date===t);if(!a){notify('❌ سجّل حضورك أولاً','e');return}if(wds.find(w=>w.aid===a.id)){notify('⚠️ طلب موجود','w');return}wds.push({id:Date.now(),aid:a.id,name:n,site:s,reason,ts:new Date().toISOString(),status:'pending'});save();document.getElementById('wdpend').style.display='block';document.getElementById('wdr').disabled=true;notify('📤 تم إرسال الطلب')}function renderDB(){const el=document.getElementById('s-db'),td=today(),ta=att.filter(a=>a.date===td),pw=wds.filter(w=>w.status==='pending').length,ab=Math.max(0,cfg.emps.length-ta.length);const sc={'العمق':ta.filter(a=>a.site==='العمق').length,'العطيف':ta.filter(a=>a.site==='العطيف').length,'المويهيه':ta.filter(a=>a.site==='المويهيه').length,'ورشة 200':ta.filter(a=>a.site==='ورشة 200').length};el.innerHTML=`<div class="stats"><div class="stat"><div class="sv" style="color:#00c2ff">${ta.length}</div><div class="sl">حضور اليوم</div></div><div class="stat"><div class="sv" style="color:#ff4757">${ab}</div><div class="sl">غياب</div></div><div class="stat"><div class="sv" style="color:#ffa502">${pw}</div><div class="sl">انسحابات</div></div>${Object.entries(sc).map(([k,v])=>`<div class="stat"><div class="sv" style="color:#00e676">${v}</div><div class="sl">${k}</div></div>`).join('')}</div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><strong>📋 حضور اليوم</strong><button class="act ap" onclick="expCSV()">⬇️ تصدير</button></div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>الاسم</th><th>الموقع</th><th>الوقت</th><th>صورة</th><th>الحالة</th></tr></thead><tbody>${ta.map(r=>{const w=wds.find(x=>x.aid===r.id);let st=`<span class="badge present">✅ حاضر</span>`;if(w){if(w.status==='pending')st=`<span class="badge withdraw">⏳ انسحاب</span><button class="act ap" onclick="apWD(${w.id})">✅</button><button class="act rj" onclick="rjWD(${w.id})">❌</button>`;else if(w.status==='approved')st=`<span class="badge absent">⬅️ منسحب</span>`}return`<tr><td><strong>${r.name}</strong></td><td><span class="site-tag">${r.site}</span></td><td><span class="time-tag">${fmt(r.ts)}</span></td><td>${r.photo?`<img src="${r.photo}" class="thumb" onclick="window.open().document.write('<img src=${r.photo} style=max-width:100%>')">`:'-'}</td><td>${st}</td></tr>`}).join('')}</tbody></table></div></div>`;checkAbsent()}function renderWD(){const el=document.getElementById('s-wd');if(!el)return;if(!wds.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#5a7a9a"><div style="font-size:36px">⬅️</div><p>لا توجد طلبات</p></div>';return}el.innerHTML=wds.map(w=>`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><strong>${w.name} <span class="site-tag">${w.site}</span></strong><span class="time-tag">${fmt(w.ts)}</span></div><p style="font-size:13px;color:#5a7a9a;font-style:italic">💬 ${w.reason}</p><div style="margin-top:10px;display:flex;gap:6px">${w.status==='pending'?`<button class="act ap" onclick="apWD(${w.id})">✅ موافقة</button><button class="act rj" onclick="rjWD(${w.id})">❌ رفض</button>`:`<span class="badge ${w.status==='approved'?'present':'absent'}">${w.status==='approved'?'✅ تمت الموافقة':'❌ مرفوض'}</span>`}</div></div>`).join('')}function apWD(id){const w=wds.find(x=>x.id===id);if(!w)return;w.status='approved';const a=att.find(x=>x.id===w.aid);if(a)a.status='withdrawn';save();renderDB();renderWD();notify('✅ تمت الموافقة')}function rjWD(id){const w=wds.find(x=>x.id===id);if(!w)return;w.status='rejected';save();renderDB();renderWD();notify('❌ تم الرفض','e')}function checkAbsent(){const td=today(),ta=att.filter(a=>a.date===td).map(a=>a.name+'_'+a.site);cfg.emps.forEach(e=>{const k=e.name+'_'+e.site;if(!ta.includes(k)&&!att.find(a=>a.name===e.name&&a.site===e.site&&a.date===td&&a.status==='absent'​​​​​​​​​​​​​​​​
)){att.push({id:Date.now()+Math.random(),name:e.name,site:e.site,date:td,ts:new Date().toISOString(),photo:'',status:'absent'});save()}})}function expCSV(){const td=today(),r=att.filter(a=>a.date===td);let c='الاسم,الموقع,الوقت,الحالة\n';r.forEach(x=>{const w=wds.find(d=>d.aid===x.id);const s=x.status==='absent'?'غائب':w?(w.status==='approved'?'منسحب':'طلب انسحاب'):'حاضر';c+=`${x.name},${x.site},${fmt(x.ts)},${s}\n`});const b=new Blob(['\uFEFF'+c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='حضور-'+td+'.csv';a.click()}const nav=document.getElementById('nav');if(nav&&nav.innerHTML.includes('الأفراد')){document.querySelector('[onclick*="em"]')&&document.querySelector('[onclick*="em"]').addEventListener('click',()=>{const el=document.getElementById('s-em');if(!el)return;el.innerHTML=`<div class="card"><h3 style="font-size:14px;font-weight:700;margin-bottom:12px">➕ إضافة فرد</h3><div class="add-form"><div><input id="en" placeholder="الاسم" style="margin:0"></div><div><select id="es" style="margin:0"><option>العمق</option><option>العطيف</option><option>المويهيه</option><option value="ورشة 200">ورشة 200</option></select></div><button class="act ap" style="padding:9px 14px" onclick="addE()">إضافة</button></div></div><div class="card"><h3 style="font-size:14px;font-weight:700;margin-bottom:12px">👥 قائمة الأفراد</h3><div id="el">${cfg.emps.length?cfg.emps.map(e=>`<div class="emp-item"><div><strong>${e.name}</strong><br><span class="site-tag">${e.site}</span></div><button class="del" onclick="delE(${e.id})">حذف</button></div>`).join(''):'<p style="color:#5a7a9a;font-size:13px">لا يوجد أفراد</p>'}</div></div>`})}function addE(){const n=document.getElementById('en').value.trim(),s=document.getElementById('es').value;if(!n){notify('⚠️ أدخل الاسم','w');return}cfg.emps.push({id:Date.now(),name:n,site:s});save();notify('✅ تم إضافة '+n);document.getElementById('en').value='';document.getElementById('el').innerHTML=cfg.emps.map(e=>`<div class="emp-item"><div><strong>${e.name}</strong><br><span class="site-tag">${e.site}</span></div><button class="del" onclick="delE(${e.id})">حذف</button></div>`).join('')}function delE(id){cfg.emps=cfg.emps.filter(e=>e.id!==id);save();document.getElementById('el').innerHTML=cfg.emps.length?cfg.emps.map(e=>`<div class="emp-item"><div><strong>${e.name}</strong><br><span class="site-tag">${e.site}</span></div><button class="del" onclick="delE(${e.id})">حذف</button></div>`).join(''):'<p style="color:#5a7a9a">لا يوجد أفراد</p>'}</script></body></html>
