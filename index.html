<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>نظام الحضور</title></head><body style="margin:0;font-family:sans-serif;background:#060b14;color:#dde6f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px"><div style="width:100%;max-width:380px;background:#0c1524;border:1px solid #1a3050;border-radius:20px;padding:28px;text-align:center"><div style="font-size:48px">🛡️</div><h1 style="color:#00c2ff;font-size:20px;margin:8px 0 4px">نظام الحضور الذكي</h1><p style="color:#5a7a9a;font-size:13px;margin-bottom:20px">سجّل دخولك للمتابعة</p><input id="n" placeholder="اسمك الكامل" style="width:100%;padding:11px;background:#111e30;border:2px solid #1a3050;border-radius:10px;color:#dde6f0;font-size:14px;margin-bottom:12px;outline:none;direction:rtl"><button onclick="var n=document.getElementById('n').value.trim();if(!n){alert('أدخل اسمك');return}localStorage.setItem('user',n);window.location.reload()" style="width:100%;padding:13px;background:linear-gradient(135deg,#00c2ff,#0088cc);color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">دخول ←</button></div><script>var u=localStorage.getItem('user');if(u)document.body.innerHTML='<div style="padding:20px;text-align:center"><h1 style="color:#00c2ff">مرحباً '+u+'</h1><p style="color:#5a7a9a;margin-top:10px">النظام يعمل ✅</p><button onclick="localStorage.clear();location.reload()" style="margin-top:20px;padding:10px 20px;background:#ff4757;color:#fff;border:none;border-radius:10px;cursor:pointer">خروج</button></div>'</script></body></html>
